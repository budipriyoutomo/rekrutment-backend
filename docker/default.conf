server {
    listen 80;
    server_name api.rekrut.calira.my.id;

    root /var/www/html/public;
    index index.php index.html;

    # Batas ukuran body upload. Default nginx cuma 1MB, bikin upload foto PNG
    # (yang lossless & biasanya >1MB) kena 413 sebelum sampai ke PHP/Laravel.
    # Disamakan dengan headroom PHP upload_max_filesize/post_max_size.
    client_max_body_size 12M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;   # 🔥 FIX penting
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
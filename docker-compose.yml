services:
  rekrutment-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: rekrutment-backend:latest
    container_name: rekrutment-backend
    restart: unless-stopped
    working_dir: /var/www/html
    # Beri worker waktu menyelesaikan job yang sedang jalan (generate PDF +
    # kirim SMTP) sebelum SIGKILL. Harus >= stopwaitsecs di supervisord.conf,
    # kalau tidak job mati di tengah dan slip nyangkut di status `processing`.
    stop_grace_period: 2m
    env_file:
      - ./src/.env
    ports:
      - "8002:80"   
    networks:
      - maharasa-net
networks:
  maharasa-net:
    external: true
    name: helpdesk_maharasa-net

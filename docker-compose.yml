services:
  rekrutment-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: rekrutment-backend:latest
    container_name: rekrutment-backend
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./src/.env
    ports:
      - "8002:80"   
    networks:
      - maharasa-net
networks:
  maharasa-net:
    external: true
    name: helpdesk_maharasa-net

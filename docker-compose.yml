version: "3.9"

services:

  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.network=internal_net"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=utomo2@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--api.dashboard=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
    networks:
      - internal_net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks:
      - internal_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-app
    restart: always
    depends_on:
      - redis
    networks:
      - internal_net
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal_net"
      - "traefik.http.routers.api.rule=Host(`api.maharasa.calira.my.id`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=myresolver"
      - "traefik.http.services.api.loadbalancer.server.port=80"
      - "traefik.http.routers.api-redirect.rule=Host(`api.maharasa.calira.my.id`)"
      - "traefik.http.routers.api-redirect.entrypoints=web"
      - "traefik.http.routers.api-redirect.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

networks:
  internal_net:
    driver: bridge